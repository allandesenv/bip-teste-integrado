spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/beneficios_db}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:app_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
